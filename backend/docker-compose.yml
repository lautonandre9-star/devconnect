version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: devconnect-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devconnect_db
      MYSQL_USER: root
      MYSQL_PASSWORD: nova_senha

    ports:
      - "3306:3306"

    volumes:
      - devconnect_mysql_data:/var/lib/mysql

    command: mysqld --default-authentication-plugin=mysql_native_password

volumes:
  devconnect_mysql_data: